
<!DOCTYPE html>
<html lang="en">

<head>

<!-- Character encoding -->
<meta charset="UTF-8">

<!-- Makes the page responsive on mobile, tablet, and desktop -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Browser tab title -->
<title>Register – ABC Bank</title>

<!-- Tailwind CSS framework used for styling -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Google Fonts used for typography -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Font Awesome icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- SweetAlert for popup alerts -->
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

<style>

/* Set default font for the whole page */
body {
  font-family: 'Source Sans 3', sans-serif;
}

</style>

</head>



<body class="min-h-screen flex bg-gray-100">


<!-- ======================================================
     MAIN PAGE LAYOUT
====================================================== -->

<main class="flex w-full min-h-screen">


  <!-- ======================================================
       LEFT VIDEO SECTION
       Displays a looping background video
       Only visible on medium screens and above
  ====================================================== -->

  <section class="hidden md:block md:w-2/3 relative h-screen overflow-hidden">

    <!-- Background video -->
    <video autoplay muted loop playsinline
      class="absolute top-0 left-0 w-full h-full object-cover">

      <source src="bank-bg.mp4" type="video/mp4">

    </video>

    <!-- Dark overlay to improve text visibility -->
    <div class="absolute inset-0 bg-black/30"></div>

  </section>



  <!-- ======================================================
       REGISTER FORM SECTION
  ====================================================== -->

  <section class="w-full md:w-1/3 flex items-center justify-center p-10 bg-white shadow-2xl">

    <article class="w-full max-w-md">


      <!-- ======================================================
           PAGE HEADER
      ====================================================== -->

      <header class="text-center mb-8">

        <!-- Bank logo -->
        <img src="abc-bank-logo.jpeg"
             class="h-36 w-auto mx-auto mb-6 object-contain">

        <!-- Page title -->
        <h2 class="text-3xl font-bold font-[Playfair_Display]"
            data-i18n="reg_title">

          Create Account

        </h2>

        <!-- Subtitle -->
        <p class="text-gray-500 text-sm"
           data-i18n="reg_subheading">

          Register to start your banking journey

        </p>

      </header>



      <!-- ======================================================
           REGISTRATION FORM
      ====================================================== -->

      <form id="registerForm" class="space-y-4">


        <!-- FIRST NAME + LAST NAME -->

        <div class="grid grid-cols-2 gap-4">

          <input id="fname"
                 type="text"
                 required
                 placeholder="First Name"
                 class="border rounded-lg p-3 w-full">

          <input id="lname"
                 type="text"
                 required
                 placeholder="Last Name"
                 class="border rounded-lg p-3 w-full">

        </div>



        <!-- EMAIL -->

        <input id="email"
               type="email"
               required
               placeholder="Email"
               class="border rounded-lg p-3 w-full">



        <!-- MOBILE -->

        <input id="mobile"
               type="tel"
               required
               placeholder="Mobile Number"
               class="border rounded-lg p-3 w-full">



        <!-- DATE OF BIRTH -->

        <input id="dob"
               type="date"
               required
               class="border rounded-lg p-3 w-full">



        <!-- PASSWORD + CONFIRM PASSWORD -->

        <div class="grid grid-cols-2 gap-4">

          <input id="password"
                 type="password"
                 required
                 minlength="6"
                 placeholder="Password"
                 class="border rounded-lg p-3 w-full">

          <input id="confirmPassword"
                 type="password"
                 required
                 placeholder="Confirm Password"
                 class="border rounded-lg p-3 w-full">

        </div>



        <!-- TERMS & CONDITIONS -->

        <label class="flex items-start gap-2 text-sm">

          <input type="checkbox"
                 id="termsCheck"
                 required
                 class="mt-1">

          <span>I agree to the Terms and Privacy Policy</span>

        </label>



        <!-- REGISTER BUTTON -->

        <button type="submit"
          class="w-full bg-blue-700 hover:bg-blue-800 text-white p-3 rounded-lg font-semibold">

          <i class="fa fa-user-plus mr-2"></i>

          Create Account

        </button>

      </form>



      <!-- ======================================================
           FOOTER LINK
      ====================================================== -->

      <footer class="text-center text-sm text-gray-500 mt-6">

        <p>

          Already have an account?

          <a href="login.html"
             class="text-blue-700 font-semibold hover:underline ml-1">

            Sign In →

          </a>

        </p>

      </footer>

    </article>

  </section>

</main>



<!-- ======================================================
     JAVASCRIPT FILES
====================================================== -->

<script src="shared.js"></script> <!-- language translations -->
<script src="logic.js"></script>  <!-- banking logic -->

<script>

/* ======================================================
   APPLY SAVED LANGUAGE ON PAGE LOAD
====================================================== */

var savedLang = localStorage.getItem('abcbank_lang') || 'en';

if (typeof applyLang === 'function')
  applyLang(savedLang);



/* ======================================================
   REGISTRATION FORM SUBMIT EVENT
====================================================== */

document.getElementById('registerForm')
.addEventListener('submit', function(e) {

  e.preventDefault(); // prevent page reload



  /* -------------------------
     GET USER INPUT VALUES
  ------------------------- */

  var fname  = document.getElementById('fname').value.trim();
  var lname  = document.getElementById('lname').value.trim();
  var email  = document.getElementById('email').value.trim();
  var mobile = document.getElementById('mobile').value.trim();
  var dob    = document.getElementById('dob').value;

  var password        = document.getElementById('password').value;
  var confirmPassword = document.getElementById('confirmPassword').value;



  /* ======================================================
     CLIENT-SIDE VALIDATION
  ====================================================== */


  /* Password length validation */

  if (password.length < 6) {

    swal(
      'Weak Password',
      'Password must be at least 6 characters.',
      'error'
    );

    return;

  }


  /* Password match validation */

  if (password !== confirmPassword) {

    swal(
      'Password Mismatch',
      'Passwords do not match.',
      'error'
    );

    return;

  }



  /* ======================================================
     REGISTER USER (logic.js function)
  ====================================================== */

  var result = abcBank.registerUser({

    fname,
    lname,
    email,
    mobile,
    dob,
    password

  });



  /* ======================================================
     REGISTRATION SUCCESS
  ====================================================== */

  if (result.success) {

    swal(
      'Registered Successfully!',
      'Welcome to ABC Bank. Redirecting to dashboard...',
      'success'
    )

    .then(function() {

      /* Auto login after registration */

      abcBank.loginUser(email, password);

      /* Redirect to dashboard */

      window.location.href = 'home.html';

    });

  }



  /* ======================================================
     REGISTRATION FAILED
  ====================================================== */

  else {

    swal(
      'Registration Failed',
      result.message || 'This email is already registered.',
      'error'
    );

  }

});

</script>

</body>
</html>
