
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABC Bank LMS Login</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

<style>
body{
font-family:'Source Sans 3',sans-serif;
}
</style>

</head>

<body class="min-h-screen flex bg-gray-100">

<!-- HEADER -->
<header class="hidden">
<h1>ABC Bank Loan Management System Login</h1>
</header>



<!-- MAIN CONTENT -->
<main class="flex w-full min-h-screen">

<!-- LEFT VIDEO SECTION -->
<section class="hidden md:block md:w-2/3 relative">

<figure>

<video autoplay muted loop playsinline class="w-full h-full object-cover">

<source src="bank-bg.mp4" type="video/mp4">

</video>

<figcaption class="sr-only">
ABC Bank background promotional video
</figcaption>

</figure>

<div class="absolute inset-0 bg-black/30"></div>

</section>



<!-- LOGIN FORM SECTION -->
<section class="w-full md:w-1/3 flex items-center justify-center p-10 bg-white shadow-2xl">

<article class="w-full max-w-md">

<header class="text-center mb-8">

<img src="abc-bank-logo.jpeg"
class="h-36 w-auto mx-auto mb-6 object-contain">

<h2 class="text-3xl font-bold font-[Playfair_Display]">
Welcome Back
</h2>

<p class="text-gray-500 text-sm">
Sign in to your ABC Bank account
</p>

</header>



<form id="loginForm" class="space-y-5">

<div>

<label class="block text-sm font-medium mb-1">
Email Address
</label>

<input
id="email"
type="email"
required
placeholder="john@email.com"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

</div>



<div>

<label class="block text-sm font-medium mb-1">
Password
</label>

<input
id="password"
type="password"
required
minlength="6"
maxlength="20"
placeholder="Enter your password"
class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">

</div>



<button
type="submit"
class="w-full bg-blue-700 hover:bg-blue-800 text-white p-3 rounded-lg font-semibold">

<i class="fa fa-right-to-bracket mr-2"></i>
Sign In

</button>

</form>



<footer class="text-center text-sm text-gray-500 mt-6">

<p>
Don't have an account?

<a href="register.html"
class="text-blue-700 font-semibold hover:underline">

Register Now →

</a>
</p>

</footer>

</article>

</section>

</main>



<!-- FOOTER -->
<footer class="hidden">
<p>© 2026 ABC Bank</p>
</footer>



<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

e.preventDefault();

let email = document.getElementById("email").value.trim();
let password = document.getElementById("password").value.trim();

if(email === "" || password === ""){

swal("Missing Fields","Please enter email and password","warning");
return;

}

if(password.length < 6){

swal("Invalid Password","Password must be at least 6 characters","error");
return;

}

swal("Login Successful","Welcome to ABC Bank","success")
.then(() => {

window.location.href="home.html";

});

});

</script>

</body>
</html>
