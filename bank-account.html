
<!DOCTYPE html>
<html lang="en">

<head>

<!-- Character encoding -->
<meta charset="UTF-8">

<!-- Responsive layout for mobile / tablet / desktop -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Browser tab title -->
<title>Open Bank Account</title>

<!-- Tailwind CSS for styling -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Font Awesome icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<!-- SweetAlert for popup alerts -->
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

<!-- Translation system -->
<script src="shared.js"></script>

<!-- Banking logic (registration/login/account management) -->
<script src="logic.js"></script>


<style>

/* Hide language switcher on this page */
#lang-switcher { display: none !important; }


/* -----------------------------------
   IMAGE PREVIEW CONTAINER
-----------------------------------*/
.preview-container {

    max-height: 140px;      /* preview box height */
    overflow: hidden;

    margin-top: 8px;

    border: 2px solid #e2e8f0;
    border-radius: 8px;

    background: #f8fafc;

    display: flex;
    align-items: center;
    justify-content: center;

    padding: 6px;
}

/* preview image styling */
.preview-img {

    max-width: 100%;
    max-height: 120px;

    object-fit: contain;

    border-radius: 6px;
}


/* -----------------------------------
   FILE STORED BADGE
   Shows green ✓ when file saved
-----------------------------------*/

.file-stored-badge {

    display: inline-flex;
    align-items: center;
    gap: 5px;

    background: #dcfce7;
    color: #16a34a;

    font-size: 12px;
    font-weight: 700;

    padding: 2px 10px;

    border-radius: 999px;

    margin-top: 6px;
}

/* badge color for PDF files */

.file-stored-badge.pdf {

    background: #fee2e2;
    color: #dc2626;

}


/* -----------------------------------
   UPLOAD PROGRESS SPINNER
-----------------------------------*/

.upload-progress {

    display: none;

    align-items: center;
    gap: 8px;

    margin-top: 6px;

    font-size: 13px;
    color: #2563eb;

    font-weight: 600;
}

/* visible spinner state */

.upload-progress.active {
    display: flex;
}


/* spinner animation */

.spinner {

    width: 16px;
    height: 16px;

    border: 2px solid #bfdbfe;
    border-top-color: #2563eb;

    border-radius: 50%;

    animation: spin 0.7s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

</style>

</head>



<body class="bg-gray-100">


<!-- =====================================
     NAVIGATION BAR
===================================== -->

<header>

<nav class="bg-blue-900 text-white shadow-xl sticky top-0 z-50">

<div class="w-full px-10 py-5 flex justify-between items-center">


<!-- BANK LOGO -->

<img src="abc-bank-logo.jpeg" class="w-12 h-12 rounded-full">

<h1 class="text-3xl font-bold">ABC Bank</h1>

</a>


<!-- BACK BUTTON -->
<a href="home.html"
   class="flex items-center gap-2 font-semibold text-lg
          bg-white/10 border border-white/25 px-5 py-2 rounded-lg">

<i class="fa fa-arrow-left"></i>
Back to Dashboard

</a>



<!-- USER PROFILE -->
<div class="relative group">

<div class="flex items-center gap-3 bg-yellow-400 text-black px-5 py-2 rounded-lg font-bold">

<i class="fa fa-user-circle text-2xl"></i>

<div>
<span id="username">Loading...</span>
<span id="userid">ID: —</span>
</div>

</div>

</div>

</div>
</nav>

</header>



<!-- =====================================
     PAGE TITLE
===================================== -->

<div class="max-w-7xl mx-auto px-6 pt-8">

<h1 class="text-4xl font-bold">Open Bank Account</h1>

<p class="text-gray-600 text-lg">
Complete the form below to open your ABC Bank account.
</p>

</div>



<!-- =====================================
     MAIN ACCOUNT FORM
===================================== -->

<main class="max-w-7xl mx-auto p-6">


<form id="accountForm"
      class="bg-white shadow-xl rounded-xl p-10 space-y-12">


<!-- =====================================
     PERSONAL INFORMATION
===================================== -->

<section>

<h2 class="text-2xl font-bold">Personal Information</h2>

<div class="grid md:grid-cols-2 gap-6">

<!-- Full Name -->
<input id="name" type="text" required>

<!-- Date of Birth -->
<input id="dob" type="date" required>

<!-- Email -->
<input id="email" type="email">

<!-- Mobile -->
<input id="mobile" type="tel">

<!-- Aadhaar -->
<input id="aadhaar" type="text">

<!-- PAN -->
<input id="pan" type="text">

</div>

</section>



<!-- =====================================
     FILE UPLOAD SECTION
===================================== -->

<section>

<h2 class="text-2xl font-bold">KYC Document Upload</h2>

<!-- Example file input -->

<input id="aadhaarFile"
       type="file"
       accept="image/*,application/pdf">

<!-- preview area -->

<div id="preview-aadhaar" class="preview-container">

<img id="img-aadhaar" class="preview-img">

</div>

</section>



<!-- =====================================
     SUBMIT BUTTON
===================================== -->

<section>

<button type="button"
        onclick="validateForm()"
        class="w-full bg-blue-700 text-white py-4 rounded-lg">

Submit Account Application

</button>

</section>


</form>

</main>




<!-- =====================================
     FOOTER
===================================== -->

<footer class="text-center text-gray-500 text-sm py-6">

© 2026 ABC Bank. All rights reserved.

</footer>



<script>


/* =========================================
   LOGIN GUARD
   Redirect user to login page if not logged in
========================================= */

if (!abcBank?.isLoggedIn?.()) {

    window.location.replace("login.html");

}


/* =========================================
   GET CURRENT USER DATA
========================================= */

const currentUser = abcBank.getCurrentUser() || {};


/* create full name */

const fullName =
    [currentUser.firstName, currentUser.lastName]
    .filter(Boolean)
    .join(" ") || "User";


/* show user name in navbar */

document.getElementById("username").textContent = fullName;
document.getElementById("profileName").textContent = fullName;


/* show account id */

if (currentUser.account?.accountNumber) {

    const a = currentUser.account.accountNumber;

    document.getElementById("profileAccount").textContent =
        "Account: " + a;

    document.getElementById("userid").textContent =
        "ID: " + a.slice(-6);

}


/* =========================================
   LOCAL STORAGE HELPERS
   Each user gets separate storage keys
========================================= */

const userId =
      currentUser.account?.accountNumber
   || currentUser.email
   || "guest";


/* create unique key */

function sk(key) {

    return `${userId}__${key}`;

}


/* read from localStorage */

function lsGet(key) {

    return localStorage.getItem(sk(key));

}


/* save to localStorage */

function lsSet(key, val) {

    localStorage.setItem(sk(key), val);

}



/* =========================================
   IMAGE COMPRESSION FUNCTION
   Compresses uploaded images before storing
========================================= */

function compressImage(file) {

return new Promise((resolve,reject)=>{

    const reader = new FileReader();

    reader.onload = function(e){

        const img = new Image();

        img.onload = function(){

            const canvas = document.createElement("canvas");

            const ctx = canvas.getContext("2d");

            canvas.width = img.width;
            canvas.height = img.height;

            ctx.drawImage(img,0,0);

            const result =
                canvas.toDataURL("image/jpeg",0.82);

            resolve(result);

        };

        img.src = e.target.result;

    };

    reader.readAsDataURL(file);

});

}



/* =========================================
   FILE UPLOAD HANDLER
========================================= */

document.getElementById("aadhaarFile")
.addEventListener("change", async function(){

    const file = this.files[0];

    if(!file) return;

    const compressed =
        await compressImage(file);

    /* store image */

    lsSet("kyc_doc_aadhaar",compressed);

});




/* =========================================
   FORM VALIDATION
========================================= */

function validateForm(){

const name =
    document.getElementById("name").value.trim();

const mobile =
    document.getElementById("mobile").value.trim();

const aadhaar =
    document.getElementById("aadhaar").value.trim();

const pan =
    document.getElementById("pan").value.trim();


/* name validation */

if(!name){

    return swal("Error","Please enter name","error");

}


/* mobile validation */

if(!/^[6-9]\d{9}$/.test(mobile)){

    return swal("Invalid Mobile",
                "Enter valid mobile number",
                "error");

}


/* aadhaar validation */

if(!/^\d{12}$/.test(aadhaar)){

    return swal("Invalid Aadhaar",
                "Aadhaar must be 12 digits",
                "error");

}


/* pan validation */

if(!/^[A-Z]{5}\d{4}[A-Z]$/.test(pan)){

    return swal("Invalid PAN",
                "Enter valid PAN",
                "error");

}


/* =====================================
   BUILD ACCOUNT OBJECT
===================================== */

const accountDetails = {

    fullName : name,
    mobile   : mobile,
    aadhaar  : aadhaar,
    pan      : pan,

    status   : "Active"

};


/* save using logic.js */

const result =
    abcBank.updateUserAccountDetails(accountDetails);


/* success */

if(result?.success){

    swal("Application Submitted",
         "Account created successfully",
         "success")

    .then(()=>{

        window.location.href = "cibil.html";

    });

}

}

</script>

</body>
</html>
