<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | ABC Bank</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>


<body class="bg-gray-100 flex items-center justify-center h-screen">

<div class="bg-white shadow-lg rounded-lg p-10 w-96">

<h2 class="text-2xl font-bold text-center text-blue-900 mb-6">

ABC Bank Password Recovery

</h2>

<p class="text-gray-600 text-center mb-6">

Enter your registered email or mobile number to reset your password.

</p>

<form>

<div class="mb-4">

<label class="block text-gray-700 font-semibold mb-2">

Email or Mobile Number

</label>

<input type="text"
placeholder="Enter registered email or mobile"
class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">

</div>

<div class="mt-6">

<button
class="w-full bg-blue-900 hover:bg-blue-800 text-white py-2 rounded-lg font-semibold">

Send Reset Link

</button>

</div>

</form>

<div class="text-center mt-6">

<a href="login.html"
class="text-blue-700 hover:underline">

Back to Login

</a>

</div>

</div>

</body>

</html>
