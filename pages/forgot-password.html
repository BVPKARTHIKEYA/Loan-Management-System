<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password | ABC Bank</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
#lang-switcher {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 9999;
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 12px;
  padding: 6px 12px;
}
#lang-switcher label {
  color: #facc15;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}
#lang-select {
  background: transparent;
  color: #fff;
  border: none;
  outline: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
#lang-select option {
  background: #1e3a5f;
  color: #fff;
}
</style>
</head>

<body class="bg-gray-100 flex items-center justify-center h-screen">

<!-- LANGUAGE SWITCHER -->
<div id="lang-switcher">
  <label><i class="fa fa-globe"></i> Language:</label>
  <select id="lang-select" onchange="applyLang(this.value)">
    <option value="en">English</option>
    <option value="te">తెలుగు</option>
    <option value="ta">தமிழ்</option>
    <option value="ml">മലയാളം</option>
    <option value="kn">ಕನ್ನಡ</option>
    <option value="hi">हिन्दी</option>
  </select>
</div>

<div class="bg-white shadow-lg rounded-lg p-10 w-96">

  <h2 class="text-2xl font-bold text-center text-blue-900 mb-6"
    data-i18n="forgot_title"></h2>

  <p class="text-gray-600 text-center mb-6"
    data-i18n="forgot_description"></p>

  <form>
    <div class="mb-4">
      <label class="block text-gray-700 font-semibold mb-2"
        data-i18n="forgot_input_label"></label>
      <input type="text"
        class="w-full border rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        data-i18n-placeholder="forgot_input_placeholder">
    </div>

    <div class="mt-6">
      <button class="w-full bg-blue-900 hover:bg-blue-800 text-white py-2 rounded-lg font-semibold"
        data-i18n="forgot_btn"></button>
    </div>
  </form>

  <div class="text-center mt-6">
    <a href="login.html" class="text-blue-700 hover:underline"
      data-i18n="forgot_back_login"></a>
  </div>

</div>

<script src="shared.js"></script>
<script>
  const savedLang = localStorage.getItem('abcbank_lang') || 'en';
  document.getElementById('lang-select').value = savedLang;
  applyLang(savedLang);
</script>

</body>
</html>
